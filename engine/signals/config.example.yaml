symbols:
  - BTCUSDT
  - ETHUSDT

# Redis connection. Overridden by REDIS_ADDR and REDIS_PASSWORD env vars.
redis:
  addr: "localhost:6379"
  password: ""

# Stream namespace prefix. Overridden by STREAM_NAMESPACE env var.
#   Live mode:    erebor:live
#   Backtest:     erebor:backtest:{run_id}
stream_namespace: "erebor:live"

# Number of price levels summed per side for the book_imbalance signal.
signal_depth: 10

log:
  level: "info"       # stderr level: debug | info | warn | error
  file_level: "debug" # file level (if file_path is set)
  file_path: ""       # leave empty to disable file logging

health:
  addr: ":8080"
